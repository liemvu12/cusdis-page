<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Trang Bình Luận Cusdis</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, #1e293b 0%, #0f172a 40%),
        #020617;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .hero {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 50px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: #2563eb;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.8;
      max-width: 700px;
    }

    .comment-box {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .comment-title {
      color: #0f172a;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .comment-desc {
      color: #64748b;
      margin-bottom: 25px;
      line-height: 1.7;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
      font-size: 14px;
    }

    /* Fix xuống dòng Cusdis */
    .cusdis-comment-content,
    .cusdis-comment-content p {
      white-space: pre-wrap !important;
      word-break: break-word;
      line-height: 1.7;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        padding: 30px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 16px;
      }

      .comment-box {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <section class="hero">

      <div class="badge">
        💬 Cusdis Comment System
      </div>

      <h1>
        Chào mừng đến với trang bình luận
      </h1>

      <p class="subtitle">
        Đây là khu vực để mọi người cùng trao đổi, góp ý và thảo luận.
        Hệ thống sử dụng Cusdis — một nền tảng comment nhẹ, hiện đại và tối giản.
      </p>

    </section>

    <section class="comment-box">

      <h2 class="comment-title">
        Bình luận
      </h2>

      <p class="comment-desc">
        Hãy để lại suy nghĩ của bạn bên dưới 👇
      </p>

      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="03cb44a1-de57-4fb4-a0b8-89b8b55afac0"
        data-page-id="home-page"
        data-page-url="https://liemvu12.github.io/cusdis-test/"
        data-page-title="Trang chủ">
      </div>

    </section>

    <footer>
      © 2026 • Powered by Cusdis
    </footer>

  </div>

  <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

</body>

</html>
